<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="alternate icon" type="image/png" href="/fungai-art-logo.png"/>
<link rel="apple-touch-icon" href="/fungai-art-logo.png"/>

  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect — preserve the full path for React Router
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1).join('/') + '/?p=' + encodeURIComponent(l.pathname + l.search) + (l.hash || ''));
  </script>
</head>
</html>
