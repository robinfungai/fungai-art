let cat='all',F=[],open=false;

// Build cat bar
const cb=document.getElementById('catBar');
CATS.forEach(c=>{
  const b=document.createElement('button');
  b.className='cb'+(c.id==='all'?' on':'');
  b.textContent=c.l;b.dataset.c=c.id;
  b.onclick=()=>{cat=c.id;document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on','fon'));b.classList.add(c.id==='fungi'?'fon':'on');render();};
  cb.appendChild(b);
});

function cLabel(id){const c=CATS.find(x=>x.id===id);return c?c.l.replace('🍄 ',''):id;}

function render(){
  const q=document.getElementById('si').value.toLowerCase().trim();
  const g=document.getElementById('grid'),r=document.getElementById('rbar');
  let list=H.filter(h=>{
    if(cat==='fungi')return h.f;
    if(cat!=='all'&&!h.c.includes(cat))return false;
    if(!q)return true;
    return h.n.toLowerCase().includes(q)||h.p.toLowerCase().includes(q)||h.c.some(c=>cLabel(c).toLowerCase().includes(q));
  });
  r.textContent=list.length+' results';
  g.innerHTML='';
  list.forEach(h=>{
    const sel=F.includes(h.id);
    const d=document.createElement('div');
    d.className='hc'+(h.f?' fungi':'')+(sel?' sel':'');
    d.innerHTML=`<div class="hname">${h.n}</div><div class="hcats">${h.f?'<span class="hcat fu">🍄 Fungi</span>':''}${h.c.slice(0,3).map(c=>`<span class="hcat">${cLabel(c)}</span>`).join('')}</div><div class="hprim">${h.p.length>95?h.p.slice(0,95)+'…':h.p}</div><button class="hadd">${sel?'✓':'+'}</button>`;
    d.querySelector('.hadd').onclick=e=>{e.stopPropagation();tog(h.id);};
    d.onclick=()=>openM(h);
    g.appendChild(d);
  });
}

function tog(id){
  const i=F.indexOf(id);
  if(i>-1)F.splice(i,1);
  else if(F.length<8)F.push(id);
  updatePanel();render();
}

function updatePanel(){
  const chips=document.getElementById('chips'),cnt=document.getElementById('fcnt'),fab=document.getElementById('fabTxt');
  chips.innerHTML=F.length===0?'<span class="fp-empty">Add herbs from the grid to build your formula.</span>':F.map(id=>{const h=H.find(x=>x.id===id);if(!h)return'';return`<span class="chip ${h.f?'fu':''}">${h.n}<button class="chip-x" onclick="tog('${id}')">×</button></span>`;}).join('');
  cnt.textContent=F.length>0?`${F.length}/8`:'';
  fab.textContent=F.length>0?`⚗ Formula (${F.length})`:'⚗ Formula';
}

function togglePanel(){open=!open;document.getElementById('fpanel').classList.toggle('open',open);}
function clearF(){F=[];updatePanel();render();}
function saveF(){
  if(!F.length)return;
  const names=F.map(id=>H.find(h=>h.id===id)?.n||id).join(', ');
  const saved=JSON.parse(localStorage.getItem('fungai_formulas')||'[]');
  saved.unshift({herbs:names,ts:Date.now()});
  localStorage.setItem('fungai_formulas',JSON.stringify(saved.slice(0,20)));
  alert('Saved: '+names);
}

function openM(h){
  const sel=F.includes(h.id);
  const cats=CATS.filter(c=>h.c.includes(c.id));
  document.getElementById('modal').innerHTML=`
    <div class="m-head"><div class="m-name">${h.n}</div><button class="m-x" onclick="closeM()">×</button></div>
    <div class="m-cats">${h.f?'<span class="mc fu">🍄 Fungi</span>':''}${cats.map((c,i)=>`<span class="mc ${i===0?'pri':''}">${c.l}</span>`).join('')}</div>
    <div class="m-prim">${h.p}</div>
    <div class="m-sec">Caution level</div>
    <span class="m-caut ${{'low':'cL','medium':'cM','high':'cH'}[h.x]}">${{'low':'● Low risk','medium':'◆ Medium — check context','high':'▲ High — professional / caution'}[h.x]}</span>
    <button id="madd" class="m-add ${h.f?'fub':''} ${sel?'in':''}" onclick="tog('${h.id}');document.getElementById('madd').textContent=F.includes('${h.id}')?'✓ In formula':'+ Add to formula';document.getElementById('madd').classList.toggle('in',F.includes('${h.id}'));">${sel?'✓ In formula':'+ Add to formula'}</button>
  `;
  document.getElementById('mbg').classList.add('on');
}
function closeM(){document.getElementById('mbg').classList.remove('on');}
function closeMbg(e){if(e.target===document.getElementById('mbg'))closeM();}

render();updatePanel();
</script>
