<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Welcome to The Mycelium — Fungai Art</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="alternate icon" type="image/png" href="/fungai-art-logo.png"/>
<link rel="apple-touch-icon" href="/fungai-art-logo.png"/>
<link rel="preconnect" href="https://api.fontshare.com"/>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500&f[]=satoshi@400,500,600&f[]=geist-mono@400&display=swap"/>
<style>
@font-face { font-family: 'TAN-PARADISO'; src: url('/fonts/TAN-PARADISO.ttf') format('truetype'); font-display: swap; }
@font-face { font-family: 'Kiona'; src: url('/fonts/Kiona-Regular.ttf') format('truetype'); font-display: swap; }
@font-face { font-family: 'Bayer'; src: url('/fonts/Bayer-TypeArchiType.otf') format('opentype'); font-display: swap; }
:root{--s:#060809;--m:#C9B894;--md:#8B7E62;--ml:#E6D9B5;--g:#6BD66F;--gl:#B6F0AE;--a:#E8B14B;--al:#F5D689;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--s);color:var(--m);font-family:'Kiona',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.18;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .79 0 0 0 0 .72 0 0 0 0 .58 0 0 0 .06 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}
.card{max-width:540px;text-align:center;}
.mark{width:80px;height:80px;margin:0 auto 28px;border-radius:50%;background:radial-gradient(circle,rgba(107,214,111,.25),rgba(107,214,111,.05));border:0.5px solid rgba(107,214,111,.4);display:flex;align-items:center;justify-content:center;animation:pulse 2.6s ease-in-out infinite;}
.mark img{width:48px;height:48px;}
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(107,214,111,.3); } 50% { box-shadow: 0 0 0 16px rgba(107,214,111,0); } }
.ey{font-family:'Bayer',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--g);margin-bottom:14px;}
.title{font-family:'TAN-PARADISO',serif;font-size:clamp(40px,7vw,68px);color:var(--ml);line-height:0.96;letter-spacing:0.005em;margin-bottom:18px;}
.title em{color:var(--g);font-style:italic;}
.blurb{font-size:15.5px;color:var(--m);line-height:1.85;max-width:48ch;margin:0 auto 32px;opacity:.92;}
.cta{display:inline-flex;align-items:center;gap:10px;font-family:'Bayer',sans-serif;font-size:11px;letter-spacing:0.26em;text-transform:uppercase;padding:14px 32px;border-radius:999px;background:linear-gradient(135deg,var(--g),#2E7A35);color:var(--s);text-decoration:none;font-weight:500;transition:transform .15s,box-shadow .15s;}
.cta:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(107,214,111,.3);}
.sub{margin-top:24px;font-family:'Bayer',sans-serif;font-size:9.5px;letter-spacing:0.22em;color:var(--md);}
.sub a{color:var(--md);text-decoration:none;border-bottom:0.5px solid rgba(139,126,98,.4);}
.sub a:hover{color:var(--ml);}
</style>
</head>
<body>
<div class="center">
  <div class="card">
    <div class="mark"><img src="/favicon.svg" alt=""/></div>
    <div class="ey">You've been invited</div>
    <h1 class="title">Welcome to<br><em>The Mycelium.</em></h1>
    <p class="blurb">You're a thread away from the rest of the network. Step inside the community portal — you'll find the member space, the events, and a place to set up your own profile.</p>
    <a href="/community/?welcome=1#members" class="cta">✦ Enter the community →</a>
    <div class="sub">or learn more about $MYCEL at <a href="/members">/members</a> · <a href="/">home</a></div>
  </div>
</div>
<script>
// Auto-redirect into community after 6 seconds (gives time to read)
setTimeout(() => { window.location.href = '/community/?welcome=1#members'; }, 6000);
</script>
<script src="/cookie-banner.js" defer></script>
</body>
</html>
