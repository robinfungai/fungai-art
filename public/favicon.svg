<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#070d0b"/>
    </radialGradient>
    <radialGradient id="amber" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F5D769"/>
      <stop offset="60%" stop-color="#E8B14B"/>
      <stop offset="100%" stop-color="#C4862E"/>
    </radialGradient>
    <radialGradient id="cap" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#E8B14B"/>
      <stop offset="100%" stop-color="#8B6320"/>
    </radialGradient>
  </defs>
  <!-- Background dark coin -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Amber outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#amber)" stroke-width="3" opacity="0.9"/>
  <!-- Soft inner glow -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#E8B14B" stroke-width="0.5" opacity="0.35"/>
  <!-- Mushroom silhouette — soft, abstract, painterly to match fungi.png -->
  <g transform="translate(0,2)">
    <!-- Cap (organic, slightly asymmetric) -->
    <path d="M 16 30 Q 17 18 32 16 Q 47 18 48 30 Q 48 32 46 32 L 18 32 Q 16 32 16 30 Z"
          fill="url(#cap)" opacity="0.95"/>
    <!-- Cap highlight -->
    <path d="M 20 22 Q 26 18 32 18 Q 36 19 38 22"
          fill="none" stroke="#F5D769" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
    <!-- Stem with gentle curve -->
    <path d="M 28 32 Q 27 38 28 44 Q 30 46 32 46 Q 34 46 36 44 Q 37 38 36 32 Z"
          fill="#D4C090" opacity="0.85"/>
    <path d="M 30 33 L 30 44" stroke="#8B6320" stroke-width="0.5" opacity="0.5"/>
    <!-- Small spore dot below -->
    <circle cx="32" cy="50" r="1.5" fill="#6BD66F" opacity="0.7"/>
  </g>
</svg>
