name: 🚀 Deploy Website

on:
  push:
    branches:
      - beta

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3
        with:
          ref: beta

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 🧹 Clean and Install
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: 🔨 Build
        run: npm run build

      - name: 🚀 Sync changes back to Beta
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # This only pushes if something actually changed, and uses [skip ci] to prevent a loop
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync from action [skip ci]" && git push origin beta)

      - name: 📂 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist