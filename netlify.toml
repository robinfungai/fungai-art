# Proxy /api/* to Netlify functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# /products → /shop permanent redirect
[[redirects]]
  from   = "/products*"
  to     = "/shop"
  status = 301

# static pages served directly: /shop, /mycelium-trance, /community

[[redirects]]
  from   = "/mixology*"
  to     = "/app.html"
  status = 200

# community is served as static HTML from public/community/index.html

# Everything else (including /) → index.html (premium home design)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
