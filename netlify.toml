# Proxy /api/* to Netlify functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Root → premium home HTML
[[redirects]]
  from   = "/"
  to     = "/home/"
  status = 302
  force  = true

# SPA routes
[[redirects]]
  from   = "/mixology*"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/products*"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/community*"
  to     = "/index.html"
  status = 200

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
