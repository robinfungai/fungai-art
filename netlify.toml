# Proxy /api/* to Netlify functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# React app routes → app.html (React SPA entry)
[[redirects]]
  from   = "/shop*"
  to     = "/products"
  status = 301

[[redirects]]
  from   = "/mycelium-trance*"
  to     = "/app.html"
  status = 200

[[redirects]]
  from   = "/mixology*"
  to     = "/app.html"
  status = 200

[[redirects]]
  from   = "/products*"
  to     = "/app.html"
  status = 200

[[redirects]]
  from   = "/community*"
  to     = "/app.html"
  status = 200

# Everything else (including /) → index.html (premium home design)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
