[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

# Force browsers to revalidate the favicon — avoids stale cached icons persisting across deploys
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/fungai-art-logo.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[build.environment]
  NODE_VERSION = "20"
  VITE_SUPABASE_URL      = "https://cyhpvsyvxzfadtyvcuwp.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5aHB2c3l2eHpmYWR0eXZjdXdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NDU5NTYsImV4cCI6MjA4NTMyMTk1Nn0.BFgP50enaZLWEzhvdfHoAYniLyJiFoo6rct7PYKx1k4"

# Proxy /api/* to Netlify functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Root → new home design (kills the old Lovable React entry on fungai.art/)
[[redirects]]
  from   = "/"
  to     = "/home/index.html"
  status = 200

# /products → /shop permanent redirect
[[redirects]]
  from   = "/products*"
  to     = "/shop"
  status = 301

# Foraging map SPA — serve foraging/index.html for /foraging
[[redirects]]
  from   = "/foraging"
  to     = "/foraging/index.html"
  status = 200

# Herbal Engine — serve herbal-engine-2/index.html for /herbal-engine-2
[[redirects]]
  from   = "/herbal-engine-2"
  to     = "/herbal-engine-2/index.html"
  status = 200
[[redirects]]
  from   = "/herbal-engine"
  to     = "/herbal-engine-2/"
  status = 301

# static pages served directly: /shop /mixology /mycelium-trance /community /health /extraction /privacy /terms /members /sporing /draw /patron /basket /onboard

# Unknown paths → branded 404
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
