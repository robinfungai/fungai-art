# Proxy /api/* to Netlify functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# /products → /shop permanent redirect
[[redirects]]
  from   = "/products*"
  to     = "/shop"
  status = 301

# Foraging map SPA — serve foraging/index.html for /foraging
[[redirects]]
  from   = "/foraging"
  to     = "/foraging/index.html"
  status = 200

# static pages served directly: /shop /mixology /mycelium-trance /community /health /extraction /privacy /terms /members /sporing /draw

# Everything else (including /) → index.html (premium home design)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
