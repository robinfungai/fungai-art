<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foraging Map — Fungai Art</title>
    <meta name="description" content="Ecological foraging intelligence map. Habitats, species probability, medicinal plants, and folklore across the Fungai Art network nodes." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <link rel="alternate icon" type="image/png" href="/favicon.png"/>
    <link rel="apple-touch-icon" href="/fungai-art-logo.png"/>
    <link rel="manifest" href="/foraging-manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Forage" />
    <meta name="theme-color" content="#07110d" />
    <link rel="apple-touch-icon" href="/fungai-art-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  </head>
  <body style="margin:0;background:#07110d;overflow:hidden;">
    <div id="root"></div>
    <script type="module" src="src/foraging/main.tsx"></script>
    <script src="/cookie-banner.js" defer></script>
    <script>
      // Register service worker for offline map use
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw-forage.js', { scope: '/foraging' })
            .then(reg => {
              console.log('[Fungai Forage] SW registered, scope:', reg.scope);
              // Store install prompt for the React app to use
              window.addEventListener('beforeinstallprompt', e => {
                e.preventDefault();
                window.__foragePWAPrompt = e;
                window.dispatchEvent(new CustomEvent('forage-installable'));
              });
            })
            .catch(err => console.log('[Fungai Forage] SW failed:', err));
        });
      }
    </script>
  </body>
</html>
